<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unifyo AI | Mobilný upload</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="ai-mobile-upload-page">
  <div class="ambient ambient--one"></div>
  <div class="ambient ambient--two"></div>

  <main class="ai-mobile-upload">
    <section class="ai-mobile-upload__card">
      <span class="section-kicker">Unifyo AI</span>
      <h1 id="mobileUploadTitle">Nahraj fotku do otvoreného AI chatu</h1>
      <p id="mobileUploadCopy">Vyber obrázok alebo odfoť novú fotku. Po odoslaní sa automaticky objaví v AI chate na počítači.</p>

      <form id="mobileUploadForm" class="ai-mobile-upload__form">
        <input id="mobileUploadToken" type="hidden" name="token" value="">
        <input id="mobileUploadCameraInput" class="sr-only" type="file" accept="image/*" capture="environment">
        <input id="mobileUploadLibraryInput" class="sr-only" type="file" accept="image/*">
        <div class="ai-mobile-upload__picker-grid">
          <button id="mobileUploadCameraBtn" class="ai-mobile-upload__picker" type="button">
            <strong id="mobileUploadCameraTitle">Odfotiť teraz</strong>
            <small id="mobileUploadCameraText">Otvorí fotoaparát a spraví novú fotku.</small>
          </button>
          <button id="mobileUploadLibraryBtn" class="ai-mobile-upload__picker" type="button">
            <strong id="mobileUploadLibraryTitle">Vybrať z galérie</strong>
            <small id="mobileUploadLibraryText">Otvorí fotky a súbory v mobile.</small>
          </button>
        </div>
        <div id="mobileUploadPreview" class="ai-mobile-upload__preview is-hidden"></div>
        <button id="mobileUploadSubmit" class="button button--primary" type="submit">Odoslať do AI chatu</button>
        <p id="mobileUploadMessage" class="auth-message" hidden></p>
      </form>
    </section>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token") || "";
      const form = document.getElementById("mobileUploadForm");
      const cameraInput = document.getElementById("mobileUploadCameraInput");
      const libraryInput = document.getElementById("mobileUploadLibraryInput");
      const tokenInput = document.getElementById("mobileUploadToken");
      const preview = document.getElementById("mobileUploadPreview");
      const submit = document.getElementById("mobileUploadSubmit");
      const cameraBtn = document.getElementById("mobileUploadCameraBtn");
      const libraryBtn = document.getElementById("mobileUploadLibraryBtn");
      const message = document.getElementById("mobileUploadMessage");
      const storageLang = window.localStorage.getItem("unifyo_lang") === "en" ? "en" : "sk";
      let selectedFile = null;

      const t = {
        sk: {
          title: "Nahraj fotku do otvoreného AI chatu",
          copy: "Vyber, či chceš spraviť novú fotku alebo nahrať obrázok z galérie. Po odoslaní sa automaticky objaví v AI chate na počítači.",
          cameraTitle: "Odfotiť teraz",
          cameraText: "Otvorí fotoaparát a spraví novú fotku.",
          libraryTitle: "Vybrať z galérie",
          libraryText: "Otvorí fotky a súbory v mobile.",
          submit: "Odoslať do AI chatu",
          sending: "Odosielam…",
          missing: "Chýba token uploadu. Vygeneruj QR kód znova z AI chatu.",
          choose: "Najprv vyber obrázok.",
          success: "Hotovo. Obrázok je pripravený v AI chate na počítači.",
        },
        en: {
          title: "Upload a photo to the open AI chat",
          copy: "Choose whether you want to take a new photo or upload one from your gallery. After upload, it will automatically appear in the AI chat on your computer.",
          cameraTitle: "Take a photo now",
          cameraText: "Opens the camera and captures a new photo.",
          libraryTitle: "Choose from gallery",
          libraryText: "Opens photos and files on your phone.",
          submit: "Send to AI chat",
          sending: "Uploading…",
          missing: "Missing upload token. Generate the QR code again from the AI chat.",
          choose: "Choose an image first.",
          success: "Done. The image is ready in the AI chat on your computer.",
        }
      }[storageLang];

      document.documentElement.lang = storageLang;
      document.getElementById("mobileUploadTitle").textContent = t.title;
      document.getElementById("mobileUploadCopy").textContent = t.copy;
      document.getElementById("mobileUploadCameraTitle").textContent = t.cameraTitle;
      document.getElementById("mobileUploadCameraText").textContent = t.cameraText;
      document.getElementById("mobileUploadLibraryTitle").textContent = t.libraryTitle;
      document.getElementById("mobileUploadLibraryText").textContent = t.libraryText;
      submit.textContent = t.submit;

      tokenInput.value = token;
      if (!token) {
        message.hidden = false;
        message.textContent = t.missing;
        message.classList.add("auth-message--error");
        submit.disabled = true;
      }

      function setSelectedFile(file) {
        selectedFile = file || null;
        if (!selectedFile) {
          preview.classList.add("is-hidden");
          preview.innerHTML = "";
          return;
        }
        const url = URL.createObjectURL(selectedFile);
        preview.classList.remove("is-hidden");
        preview.innerHTML = `
          <img src="${url}" alt="${selectedFile.name}">
          <div>
            <strong>${selectedFile.name}</strong>
            <span>${Math.max(1, Math.round(selectedFile.size / 1024))} KB</span>
          </div>
        `;
      }

      cameraBtn.addEventListener("click", () => cameraInput.click());
      libraryBtn.addEventListener("click", () => libraryInput.click());

      cameraInput.addEventListener("change", () => setSelectedFile(cameraInput.files && cameraInput.files[0]));
      libraryInput.addEventListener("change", () => setSelectedFile(libraryInput.files && libraryInput.files[0]));

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const file = selectedFile;
        if (!file) {
          message.hidden = false;
          message.textContent = t.choose;
          message.classList.add("auth-message--error");
          return;
        }
        const body = new FormData();
        body.append("token", tokenInput.value);
        body.append("attachment", file, file.name);
        submit.disabled = true;
        submit.textContent = t.sending;
        message.hidden = true;
        message.textContent = "";
        message.classList.remove("auth-message--error");
        try {
          const response = await fetch("/api/assistant-mobile-upload", {
            method: "POST",
            body,
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || "Upload failed.");
          }
          message.hidden = false;
          message.textContent = t.success;
          submit.textContent = t.success;
        } catch (error) {
          message.hidden = false;
          message.textContent = error.message || "Upload failed.";
          message.classList.add("auth-message--error");
          submit.disabled = false;
          submit.textContent = t.submit;
        }
      });
    }());
  </script>
</body>
</html>
