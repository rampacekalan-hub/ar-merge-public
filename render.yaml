services:
  - type: web
    name: ar-merge-public
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py
    autoDeploy: true
    disk:
      name: app-disk
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /var/data/app.db
      - key: APP_BASE_URL
        value: https://www.unifyo.online
      - key: MAX_REQUEST_BODY_MB
        value: "110"
      - key: MAX_CONTACT_FILE_MB
        value: "8"
      - key: MAX_COMPRESS_FILE_MB
        value: "100"
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: STRIPE_PRICE_ID
        value: price_1TG0m1JJsHlQYfgdgMnHLJ8r
      - key: OPENAI_API_KEY
        sync: false
