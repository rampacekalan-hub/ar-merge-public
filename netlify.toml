# Statický export: plná Unifyo (API, Stripe) potrebuje Python backend na vlastnom serveri (viď DEPLOY.md).

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
